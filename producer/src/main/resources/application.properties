# ========================
# Server
# ========================
server.port=8080
server.id=${HOSTNAME:producer-local}

# ========================
# Jackson
# ========================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# ========================
# RabbitMQ
# ========================
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Channel pool size for publishing
rabbitmq.channel.pool.size=20

# ========================
# Room Configuration
# ========================
rabbitmq.rooms=20
rabbitmq.queue.message-ttl=60000
rabbitmq.queue.max-length=10000

# ========================
# Redis
# ========================
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ========================
# Circuit Breaker RabbitMQ publish (producer side)
# ========================
# Evaluate failure rate over a sliding window of last 10 calls
resilience4j.circuitbreaker.instances.rabbitmq-publish.sliding-window-size=10
# Start evaluating after just 5 calls
resilience4j.circuitbreaker.instances.rabbitmq-publish.minimum-number-of-calls=5
# Open circuit if >=50% of calls in the window fail
resilience4j.circuitbreaker.instances.rabbitmq-publish.failure-rate-threshold=50
# Stay OPEN for 30s, then transition to HALF-OPEN automatically
resilience4j.circuitbreaker.instances.rabbitmq-publish.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.rabbitmq-publish.automatic-transition-from-open-to-half-open-enabled=true
# Allow 3 test calls in HALF-OPEN before deciding to close or re-open
resilience4j.circuitbreaker.instances.rabbitmq-publish.permitted-number-of-calls-in-half-open-state=3
